name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Select Xcode
        run: |
          latest_xcode="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n 1)"
          if [[ -z "$latest_xcode" ]]; then
            echo "No Xcode installation found under /Applications" >&2
            exit 1
          fi
          sudo xcode-select -s "$latest_xcode/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck
