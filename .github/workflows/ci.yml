name: CI

on:
  push:
  pull_request:

jobs:
  native-validation:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Select Xcode
        run: |
          if [[ ! -d /Applications/Xcode.app ]]; then
            echo "Expected stable Xcode at /Applications/Xcode.app" >&2
            exit 1
          fi
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test
